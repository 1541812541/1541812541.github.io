<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食谱后台管理</title>
    <meta name="theme-color" content="#07090d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="食谱库" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./images/icon-192.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2032%2032%22%3E%3Crect%20width=%2232%22%20height=%2232%22%20rx=%226%22%20fill=%22%231a1d28%22/%3E%3Ctext%20x=%2216%22%20y=%2223%22%20text-anchor=%22middle%22%20font-size=%2220%22%3E??%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <header class="site-header">
    <div class="brand-text">后台管理</div>

    <nav class="nav-pill">
      <a href="./index.html" class="nav-item">返回首页</a>
      <a href="#" class="nav-item active">食谱管理</a>
    </nav>

    <div class="header-actions">
      <button class="admin-export" id="saveDataJsBtn">保存到 data.js</button>
      <button class="admin-export" id="exportBtn">备用下载</button>
      <button class="admin-export" id="resetDataBtn">恢复默认</button>
    </div>
  </header>

  <main class="admin-layout">
    <section class="admin-panel">
      <div class="admin-head">
        <h1>添加 / 编辑食谱</h1>
        <p>这里的数据保存在浏览器 localStorage 中，不需要数据库。</p>
      </div>

      <form class="recipe-form" id="recipeForm">
        <input type="hidden" id="recipeId" />

        <div class="form-grid">
          <label>
            菜谱名称
            <input type="text" id="name" placeholder="例如：红烧肉" required />
          </label>

                    <label>
            图片路径
            <div class="img-path-row">
              <input type="text" id="image" placeholder="./images/hongshaorou.jpg" required />
              <input type="file" id="imageUpload" accept="image/*" style="display:none" />
              <button type="button" class="upload-btn" id="imageUploadBtn" title="选择本地图片，自动复制到 images/ 文件夹">📁 选图</button>
            </div>
            <div class="image-preview" id="imagePreview" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleImageDrop(event)">
              <img id="imagePreviewImg" src="" alt="预览" style="display:none" />
              <span class="preview-hint" id="imagePreviewHint">输入路径后自动预览，或拖拽图片 / 点击「选图」上传</span>
            </div>
          </label>

          <label>
            分类
            <input type="text" id="category" placeholder="午餐,晚餐" required />
          </label>

          <label>
            口味
            <input type="text" id="taste" placeholder="麻辣,汤类" required />
          </label>

          <label>
            食材
            <input type="text" id="ingredients" placeholder="五花肉,葱,姜,冰糖" required />
          </label>

          <label>
            制作时间
            <input type="text" id="time" placeholder="30分钟" />
          </label>

          <label>
            难度
            <input type="text" id="difficulty" placeholder="简单 / 中等 / 较难" />
          </label>

          <label>
            份量
            <input type="text" id="servings" placeholder="2-3人" />
          </label>
        </div>

        <label>
          制作步骤
          <textarea id="steps" placeholder="每一行写一个步骤"></textarea>
        </label>

        <label>
          小贴士
          <textarea id="tips" placeholder="例如：火候不要太大"></textarea>
        </label>

        <div class="form-actions">
          <button type="submit" class="primary-btn">保存食谱</button>
          <button type="button" class="secondary-btn" id="clearFormBtn">清空表单</button>
        </div>
      </form>
    </section>

    <section class="admin-panel">
      <div class="admin-head">
        <h1>分类 / 口味 / 食材管理</h1>
        <p>新增分类后，首页筛选栏会自动更新。</p>
      </div>

      <div class="manager-grid">
        <div class="manager-card">
          <h3>分类</h3>
          <div class="mini-form">
            <input type="text" id="newCategory" placeholder="新增分类" />
            <button id="addCategoryBtn">添加</button>
          </div>
          <div class="manager-tags" id="categoryList"></div>
        </div>

        <div class="manager-card">
          <h3>口味</h3>
          <div class="mini-form">
            <input type="text" id="newTaste" placeholder="新增口味" />
            <button id="addTasteBtn">添加</button>
          </div>
          <div class="manager-tags" id="tasteList"></div>
        </div>

        <div class="manager-card">
          <h3>食材</h3>
          <div class="mini-form">
            <input type="text" id="newIngredient" placeholder="新增食材" />
            <button id="addIngredientManageBtn">添加</button>
          </div>
          <div class="manager-tags" id="ingredientList"></div>
        </div>
      </div>
    </section>

    <section class="admin-panel full">
      <div class="admin-head row">
        <div>
          <h1>当前食谱列表</h1>
          <p>可以编辑或删除已有食谱。</p>
        </div>
      </div>

      <div class="admin-table" id="recipeTable"></div>
    </section>
  </main>

  <script src="./js/data.js"></script>
  <script src="./js/admin.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
